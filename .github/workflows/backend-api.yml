name: Backend API

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: http://127.0.0.1:8001
      TEST_EMAIL: ci-smoke+${{ github.run_id }}@example.com
      TEST_PASSWORD: M34g4n123
      TEST_FULL_NAME: CI Smoke User

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          pip install pytest requests

      - name: Start API server
        shell: bash
        run: |
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 > uvicorn-ci.log 2>&1 &
          echo $! > uvicorn-ci.pid

      - name: Wait for API
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS "$BASE_URL/docs" >/dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat uvicorn-ci.log || true
          exit 1

      - name: Run pytest suite
        shell: bash
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_EMAIL: ${{ env.TEST_EMAIL }}
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
          TEST_FULL_NAME: ${{ env.TEST_FULL_NAME }}
        run: |
          pytest -q tests/test_api_smoke.py tests/test_api_negative.py

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-ci-log
          path: uvicorn-ci.log
